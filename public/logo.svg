<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#120e2e" />
      <stop offset="100%" stop-color="#030303" />
    </radialGradient>
    
    <!-- Emblem Gradient -->
    <linearGradient id="emblemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Accent Ring Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15" />
    </linearGradient>
  </defs>

  <!-- Outer Circular Border & Backdrop -->
  <circle cx="50%" cy="50%" r="47" fill="url(#bgGrad)" stroke="#27272a" stroke-width="2" />
  
  <!-- Sleek Accent Dash Ring -->
  <circle cx="50%" cy="50%" r="41" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="14 6 8 4" />
  <circle cx="50" cy="50" r="47" fill="url(#bgGrad)" stroke="#27272a" stroke-width="2" />
  
  <!-- Sleek Accent Dash Ring -->
  <circle cx="50" cy="50" r="41" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="14 6 8 4" />

  <!-- Abstract Intertwined Creative Network Shapes (C + H concept) -->
  <g transform="translate(10, 10) scale(0.8)">
    <!-- The Left curved node representing "C" and "Creativity" -->
    <path d="M35 30 A20 20 0 1 0 35 70" fill="none" stroke="url(#emblemGrad)" stroke-width="7" stroke-linecap="round" />
    
    <!-- Connection Hub Central Link -->
    <line x1="33" y1="50" x2="67" y2="50" stroke="url(#emblemGrad)" stroke-width="7" stroke-linecap="round" />

    <!-- The Right bar node representing "H" and "Hub" -->
    <path d="M49 30 L49 70 M65 30 L65 70" fill="none" stroke="url(#emblemGrad)" stroke-width="7" stroke-linecap="round" />
  </g>

  <!-- Pulse Center Connection Dot -->
  <circle cx="50" cy="50" r="4" fill="#ffffff" />
</svg>
